<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Supported Assets & Liquidity Metrics</title>
  <meta name="description" content="Explore the supported blockchains, token lists, and market indicators.">
  <link rel="canonical" href="https://tornadocash-v2.github.io/supported-chains/">
  <meta name="robots" content="index,follow">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Supported Assets & Liquidity Metrics">
  <meta property="og:description" content="Explore the supported blockchains, token lists, and market indicators.">
  <meta property="og:url" content="https://tornadocash-v2.github.io/supported-chains/">
  <meta property="og:image" content="https://tornadocash-v2.github.io/og-cover.png">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Supported Assets & Liquidity Metrics">
  <meta name="twitter:description" content="Explore the supported blockchains, token lists, and market indicators.">
  <link rel="icon" type="image/png" href="../favicon.png">
  <link rel="manifest" href="../site.webmanifest">
  <link rel="apple-touch-icon" href="../favicon.png">
  <style>

  :root{
    --bg:#0A0710; --bg-2:#0E0A16;
    --panel:rgba(255,255,255,.045); --panel-2:rgba(255,255,255,.072);
    --text:#F4F1F7; --muted:#A89FB2; --quiet:#7B7287;
    --line:rgba(255,255,255,.09); --line-2:rgba(255,255,255,.055);
    --accent:#0EA56A; --accent-2:#0EA56A; --accent-ink:#0A7A4E; --accent-soft:rgba(14,165,106,.1);
    --radius:22px; --radius-sm:14px;
    --shadow:0 40px 90px -50px rgba(0,0,0,.9), 0 12px 30px -20px rgba(0,0,0,.7);
    --ui:"Space Grotesk",-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
    --body:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0; overflow-x:hidden}
  body{
    background:var(--bg); color:var(--text); font-family:var(--body); line-height:1.55;
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility; position:relative;
  }
  a{color:inherit; text-decoration:none}
  a.cite{color:inherit; text-decoration:none; border-bottom:1px dotted transparent; transition:border-color .15s ease}
  a.cite:hover{border-bottom-color:var(--quiet)}
  img{display:block; max-width:100%}
  button{font:inherit; cursor:pointer; border:none; background:none; color:inherit}
  h1,h2,h3,p{margin:0}

  /* ---------- aurora texture ---------- */
  .bg{position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden}
  .bg .glow{
    position:absolute; inset:0;
    background:
      radial-gradient(760px 520px at 50% -8%, rgba(14,165,106,.20), transparent 60%),
      radial-gradient(680px 520px at 88% 8%, rgba(14,165,106,.12), transparent 62%),
      radial-gradient(720px 560px at 6% 30%, rgba(14,165,106,.08), transparent 60%);
  }
  .bg .dots{
    position:absolute; inset:0;
    background-image:radial-gradient(rgba(255,255,255,.07) 1px, transparent 1.4px);
    background-size:24px 24px;
    -webkit-mask-image:radial-gradient(130% 90% at 50% 6%, #000 42%, transparent 86%);
            mask-image:radial-gradient(130% 90% at 50% 6%, #000 42%, transparent 86%);
  }

  /* ---------- top bar ---------- */
  .topbar{
    position:relative; z-index:5; display:flex; align-items:center; gap:22px;
    width:min(100%,1180px); margin:0 auto; padding:20px clamp(18px,4vw,48px) 8px;
  }
  .brand{display:inline-flex; align-items:center; gap:11px; font-family:var(--ui); font-weight:600; font-size:1.04rem; letter-spacing:0}
  .brand img{width:30px; height:30px; border-radius:9px; box-shadow:0 0 0 1px var(--line)}
  .spacer{flex:1}
  .nav{display:flex; align-items:center; gap:clamp(16px,2.6vw,30px)}
  .nav a{font-family:var(--ui); font-weight:500; font-size:.92rem; color:var(--muted); transition:color .16s ease}
  .nav a:hover{color:var(--text)}

  /* ---------- shared section frame ---------- */
  .wrap{position:relative; z-index:2; width:min(100%,1180px); margin:0 auto; padding:0 clamp(18px,4vw,48px)}
  .sec{padding-top:clamp(50px,7.5vh,96px); padding-bottom:clamp(50px,7.5vh,96px)}
  .sec-head{text-align:center; max-width:60ch; margin:0 auto clamp(28px,4vh,44px)}
  .eyebrow{
    display:inline-flex; align-items:center; gap:9px; padding:7px 14px; border:1px solid var(--line);
    border-radius:999px; background:var(--panel); font-family:var(--ui); font-weight:600;
    font-size:.74rem; letter-spacing:.14em; text-transform:uppercase; color:var(--accent-ink);
  }
  .eyebrow .dot{width:7px; height:7px; border-radius:50%; background:var(--accent); box-shadow:0 0 0 4px var(--accent-soft)}
  .h2{margin-top:18px; font-family:var(--ui); font-weight:700; color:var(--text); font-size:clamp(1.9rem,3.6vw,2.8rem); line-height:1.04; letter-spacing:0}
  .sec-head p{margin-top:14px; color:var(--muted); font-size:clamp(1rem,1.3vw,1.12rem); line-height:1.6}

  /* ---------- hero (centered spotlight) ---------- */
  .hero{text-align:center; padding-top:clamp(26px,5vh,64px); padding-bottom:clamp(20px,3vh,40px)}
  .hero .eyebrow{margin:0 auto}
  .hero h1{
    margin:22px auto 0; font-family:var(--ui); font-weight:700; color:var(--text);
    font-size:clamp(3.1rem,7.4vw,5.6rem); line-height:.96; letter-spacing:0; max-width:14ch;
  }
  .deck{max-width:52ch; margin:20px auto 0; color:var(--muted); font-size:clamp(1.05rem,1.5vw,1.24rem); line-height:1.58}
  .deck strong{color:var(--text); font-weight:600}
  .cta-row{display:flex; flex-wrap:wrap; align-items:center; justify-content:center; gap:14px; margin:30px 0 0}
  .primary{
    display:inline-flex; align-items:center; justify-content:center; gap:9px; min-height:56px; padding:0 30px;
    border-radius:15px; color:#fff; font-family:var(--ui); font-weight:600; font-size:1.04rem; letter-spacing:0;
    background:linear-gradient(180deg, var(--accent), var(--accent-2));
    box-shadow:0 20px 44px -22px rgba(14,165,106,.9), inset 0 1px 0 rgba(255,255,255,.25);
    transition:transform .18s ease, box-shadow .18s ease, filter .18s ease;
  }
  .primary:hover{transform:translateY(-1px); filter:brightness(1.06); box-shadow:0 26px 52px -22px rgba(14,165,106,1)}
  .primary svg{width:17px; height:17px}
  .ghost{
    display:inline-flex; align-items:center; gap:8px; min-height:56px; padding:0 22px; border-radius:15px;
    border:1px solid var(--line); background:var(--panel); color:var(--text);
    font-family:var(--ui); font-weight:600; font-size:1rem; transition:border-color .16s ease, background .16s ease, transform .16s ease;
  }
  .ghost:hover{border-color:rgba(14,165,106,.5); background:var(--panel-2); transform:translateY(-1px)}
  .ghost svg{width:15px; height:15px; color:var(--accent-ink)}
  .chips{list-style:none; margin:26px 0 0; padding:0; display:flex; flex-wrap:wrap; justify-content:center; gap:9px}
  .chips li{display:inline-flex; align-items:center; gap:8px; padding:8px 15px; border:1px solid var(--line); border-radius:999px; background:var(--panel); font-family:var(--ui); font-weight:500; font-size:.86rem; color:var(--muted)}
  .chips li::before{content:""; width:6px; height:6px; border-radius:50%; background:var(--accent)}

  /* ---------- horizontal route panel ---------- */
  .route-panel{
    width:min(100%,720px); margin:clamp(34px,5vh,52px) auto 0; padding:18px;
    border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow);
    background:linear-gradient(180deg, var(--panel-2), var(--panel)); backdrop-filter:blur(16px); text-align:left;
  }
  .rp-head{display:flex; align-items:center; justify-content:space-between; padding:2px 6px 14px}
  .rp-head .ct{font-family:var(--ui); font-weight:600; font-size:1.04rem}
  .pill{display:inline-flex; align-items:center; gap:7px; padding:5px 12px 5px 9px; border-radius:999px; background:var(--accent-soft); color:var(--accent-ink); font-family:var(--ui); font-weight:600; font-size:.74rem}
  .pill .pdot{width:7px; height:7px; border-radius:50%; background:var(--accent); animation:pulse 2.4s ease-out infinite}
  .route{display:grid; grid-template-columns:minmax(0,1fr) 50px minmax(0,1fr); align-items:center; gap:12px}
  .leg{min-width:0; padding:15px 16px; border:1px solid var(--line); border-radius:var(--radius-sm); background:var(--panel)}
  .leg .label{display:block; color:var(--quiet); font-size:.72rem; font-weight:600; letter-spacing:.08em; text-transform:uppercase}
  .leg .chiprow{display:flex; align-items:center; justify-content:space-between; gap:10px; margin-top:12px}
  .tok{display:inline-flex; align-items:center; gap:9px; font-family:var(--ui); font-weight:600; font-size:1.06rem; color:var(--text)}
  .tok img{width:26px; height:26px; border-radius:50%; box-shadow:0 0 0 1px var(--line)}
  .tok .cv{color:var(--quiet); font-size:.8em}
  .ghostval{color:var(--quiet); font-size:.82rem}
  .switch{
    width:46px; height:46px; justify-self:center; border-radius:50%; border:1px solid var(--line);
    background:linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.02)), #0F0A19;
    color:var(--accent-ink); display:grid; place-items:center; transition:transform .25s ease, border-color .2s ease;
  }
  .switch svg{width:18px; height:18px}
  .switch:hover{transform:rotate(180deg); border-color:rgba(14,165,106,.55)}
  .rp-meta{display:flex; align-items:center; gap:8px; margin-top:10px; padding:11px 14px; border-radius:12px; background:var(--panel); color:var(--muted); font-size:.82rem}
  .rp-meta svg{width:15px; height:15px; color:var(--accent-ink); flex:none}
  .rp-cta{display:flex; align-items:center; justify-content:center; gap:8px; width:100%; margin-top:10px; min-height:52px; border-radius:14px; color:#fff; font-family:var(--ui); font-weight:600; font-size:1rem; background:linear-gradient(180deg, var(--accent), var(--accent-2)); box-shadow:0 16px 34px -20px rgba(14,165,106,.9); transition:transform .18s ease, filter .18s ease}
  .rp-cta:hover{transform:translateY(-1px); filter:brightness(1.06)}
  .rp-note{margin:11px 0 2px; text-align:center; color:var(--quiet); font-size:.78rem}

  /* ---------- how it works (horizontal connector) ---------- */
  .steps{display:grid; grid-template-columns:repeat(3,1fr); gap:18px; position:relative}
  .steps::before{content:""; position:absolute; top:23px; left:14%; right:14%; height:1px; background:linear-gradient(90deg, transparent, var(--line-strong, rgba(255,255,255,.12)), transparent)}
  .step{text-align:center; padding:0 8px}
  .step .node{width:46px; height:46px; margin:0 auto; border-radius:50%; display:grid; place-items:center; background:var(--bg-2); border:1px solid var(--line); color:var(--accent-ink); font-family:var(--ui); font-weight:700; font-size:1rem; position:relative; z-index:1; box-shadow:0 0 0 5px var(--bg)}
  .step h3{margin:16px 0 8px; font-family:var(--ui); font-weight:600; font-size:1.12rem; color:var(--text); letter-spacing:0}
  .step p{color:var(--muted); font-size:.93rem; line-height:1.55; max-width:30ch; margin:0 auto}

  /* ---------- why (bento) ---------- */
  .bento{display:grid; grid-template-columns:repeat(3,1fr); gap:14px}
  .tile{padding:24px 22px; border:1px solid var(--line); border-radius:18px; background:linear-gradient(180deg, var(--panel-2), var(--panel)); position:relative; overflow:hidden}
  .tile::before{content:""; position:absolute; inset:0 0 auto; height:1px; background:linear-gradient(90deg, transparent, rgba(14,165,106,.5), transparent)}
  .tile.wide{grid-column:span 3; display:grid; grid-template-columns:1.1fr 1fr; gap:22px; align-items:center}
  .tile .ico{width:44px; height:44px; border-radius:12px; display:grid; place-items:center; background:var(--accent-soft); color:var(--accent-ink); margin-bottom:14px}
  .tile .ico svg{width:21px; height:21px}
  .tile h3{font-family:var(--ui); font-weight:600; font-size:1.16rem; color:var(--text); letter-spacing:0}
  .tile.wide h3{font-size:1.5rem}
  .tile p{margin-top:9px; color:var(--muted); font-size:.95rem; line-height:1.6}
  .tile .mini-route{border:1px solid var(--line); border-radius:14px; background:var(--panel); padding:16px; display:flex; align-items:center; justify-content:center; gap:12px; font-family:var(--ui); font-weight:600; color:var(--muted)}
  .tile .mini-route img{width:30px; height:30px; border-radius:50%; box-shadow:0 0 0 1px var(--line)}
  .tile .mini-route .arr{color:var(--accent-ink)}

  /* ---------- networks ---------- */
  .nets{display:flex; flex-wrap:wrap; justify-content:center; gap:10px; max-width:760px; margin:0 auto}
  .net{display:inline-flex; align-items:center; gap:9px; padding:11px 18px; border:1px solid var(--line); border-radius:999px; background:var(--panel); font-family:var(--ui); font-weight:600; font-size:.94rem; color:var(--text)}
  .net .nd{width:9px; height:9px; border-radius:50%; background:var(--accent)}
  .nets-foot{text-align:center; margin-top:22px}
  .nets-foot a{display:inline-flex; align-items:center; gap:7px; color:var(--accent-ink); font-family:var(--ui); font-weight:600; font-size:.96rem}
  .nets-foot a:hover{text-decoration:underline}
  .nets-foot svg{width:15px; height:15px}

  /* ---------- FAQ (centered single column) ---------- */
  .faq{max-width:760px; margin:0 auto}
  .qa{padding:24px 4px; border-top:1px solid var(--line)}
  .qa:first-child{border-top:none}
  .qa h3{font-family:var(--ui); font-weight:600; font-size:1.16rem; color:var(--text); letter-spacing:0; display:flex; gap:12px}
  .qa h3 .qn{color:var(--accent-ink); font-size:.92rem; font-weight:700; padding-top:3px}
  .qa p{margin-top:10px; padding-left:30px; color:var(--muted); font-size:.98rem; line-height:1.65}
  .qa a:not(.cite){color:var(--accent-ink); font-weight:600}

  /* ---------- explore ---------- */
  .explore{display:grid; grid-template-columns:repeat(3,1fr); gap:14px}
  .ex{display:flex; flex-direction:column; gap:7px; padding:22px; border:1px solid var(--line); border-radius:16px; background:var(--panel); transition:transform .16s ease, border-color .16s ease, background .16s ease}
  .ex:hover{transform:translateY(-2px); border-color:rgba(14,165,106,.45); background:var(--panel-2)}
  .ex .et{display:flex; align-items:center; justify-content:space-between; gap:10px; font-family:var(--ui); font-weight:600; font-size:1.05rem; color:var(--text)}
  .ex .et svg{width:16px; height:16px; color:var(--accent-ink); flex:none}
  .ex p{color:var(--muted); font-size:.9rem; line-height:1.5}

  /* ---------- footer ---------- */
  .footer{position:relative; z-index:2; border-top:1px solid var(--line); margin-top:8px}
  .footer .wrap{padding-top:28px; padding-bottom:36px; text-align:center; color:var(--quiet); font-size:.84rem}
  .footer b{color:var(--muted); font-weight:600}

  @keyframes pulse{0%{box-shadow:0 0 0 0 var(--accent-soft)} 70%{box-shadow:0 0 0 8px rgba(14,165,106,0)} 100%{box-shadow:0 0 0 0 rgba(14,165,106,0)}}

  @media (max-width:900px){
    .nav{display:none}
    .steps{grid-template-columns:1fr; gap:26px}
    .steps::before{display:none}
    .bento{grid-template-columns:1fr}
    .tile.wide{grid-column:span 1; grid-template-columns:1fr}
    .explore{grid-template-columns:1fr}
  }
  @media (max-width:560px){
    .route{grid-template-columns:1fr; gap:9px}
    .switch{transform:rotate(90deg)}
    .switch:hover{transform:rotate(270deg)}
    .cta-row .primary,.cta-row .ghost{width:100%}
  }
  @media (prefers-reduced-motion:reduce){*{animation-duration:.01ms!important; transition-duration:.01ms!important}}
  

/* --- Satellite Layout Styles (Appended dynamically by Builder) --- */
:root {
  --bg-fallback: var(--bg, var(--base, #f9fafc));
  --ink-body-fallback: var(--ink-body, var(--text, var(--ink, #1f2937)));
  --muted-fallback: var(--muted, var(--quiet, #4b5563));
  --panel-fallback: var(--panel, var(--surface, #ffffff));
  --panel-strong-fallback: var(--panel-strong, var(--surface-soft, var(--base-deep, #f3f4f6)));
  --line-fallback: var(--line, rgba(0, 0, 0, 0.08));
  --line-strong-fallback: var(--line-strong, rgba(0, 0, 0, 0.14));
  --accent-fallback: var(--accent, #625bf3);
}

body {
  overflow-y: auto !important;
  height: auto !important;
  min-height: 100dvh;
}

.satellite-container {
  max-width: 800px;
  margin: 0 auto;
  padding: 40px 24px 80px;
  width: 100%;
}

.breadcrumb {
  font-size: 0.875rem;
  color: var(--muted-fallback);
  margin-bottom: 24px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.breadcrumb a {
  color: var(--muted-fallback);
  text-decoration: none;
}

.breadcrumb a:hover {
  color: var(--accent-fallback);
}

.satellite-title {
  font-size: clamp(2.1rem, 5.5vw, 2.9rem);
  font-weight: 800;
  letter-spacing: -0.03em;
  line-height: 1.15;
  margin-bottom: 20px;
  color: var(--ink-body-fallback);
}

.satellite-lead {
  font-size: 1.125rem;
  color: var(--muted-fallback);
  line-height: 1.7;
  margin-bottom: 40px;
}

.satellite-lead strong {
  color: var(--ink-body-fallback);
}

.section-block {
  margin-bottom: 40px;
  text-align: left;
}

.section-block h2 {
  font-size: 1.55rem;
  font-weight: 750;
  letter-spacing: -0.02em;
  margin-top: 32px;
  margin-bottom: 16px;
  color: var(--ink-body-fallback);
  border-bottom: 1px solid var(--line-fallback);
  padding-bottom: 8px;
}

.section-block h3 {
  font-size: 1.2rem;
  font-weight: 650;
  margin: 24px 0 12px;
  color: var(--ink-body-fallback);
}

.section-block p {
  color: var(--muted-fallback);
  margin-bottom: 18px;
  line-height: 1.7;
}

.section-block p strong {
  color: var(--ink-body-fallback);
}

.section-block ul, .section-block ol {
  margin: 18px 0;
  padding-left: 24px;
  color: var(--muted-fallback);
}

.section-block li {
  margin-bottom: 8px;
  line-height: 1.65;
}

.section-block li strong {
  color: var(--ink-body-fallback);
}

/* Info Grid Cards */
.info-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 18px;
  margin: 24px 0;
}

.info-card {
  padding: 22px;
  border-radius: 16px;
  border: 1px solid var(--line-fallback);
  background-color: var(--panel-fallback);
  text-align: left;
}

.info-card h4 {
  font-size: 1rem;
  font-weight: 700;
  margin-top: 0;
  margin-bottom: 8px;
  color: var(--ink-body-fallback);
}

.info-card p {
  font-size: 0.9rem;
  color: var(--muted-fallback);
  margin: 0;
  line-height: 1.55;
}

/* Tables */
.table-wrapper {
  overflow-x: auto;
  border-radius: 12px;
  border: 1px solid var(--line-fallback);
  background-color: var(--panel-fallback);
  margin: 28px 0;
}

.data-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.925rem;
  text-align: left;
}

.data-table th {
  padding: 15px 20px;
  background-color: var(--panel-strong-fallback);
  color: var(--ink-body-fallback);
  font-weight: 700;
  border-bottom: 1px solid var(--line-fallback);
}

.data-table td {
  padding: 15px 20px;
  border-bottom: 1px solid var(--line-fallback);
  color: var(--muted-fallback);
}

.data-table tr:last-child td {
  border-bottom: 0;
}

.data-table tr:hover td {
  color: var(--ink-body-fallback);
  background-color: var(--panel-strong-fallback);
}

.highlight-cell {
  color: var(--accent-fallback);
  font-weight: 600;
}

/* Accordion details/summary for FAQ Page */
.faq-list {
  display: flex;
  flex-direction: column;
  gap: 14px;
  margin: 28px 0;
}

.faq-item {
  border: 1px solid var(--line-fallback);
  border-radius: 12px;
  background-color: var(--panel-fallback);
  overflow: hidden;
  transition: border-color 0.2s ease;
  text-align: left;
}

.faq-item[open] {
  border-color: var(--line-strong-fallback);
}

.faq-item summary {
  padding: 20px 24px;
  font-weight: 650;
  font-size: 1.05rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: space-between;
  list-style: none;
  color: var(--ink-body-fallback);
}

.faq-item summary::-webkit-details-marker {
  display: none;
}

.faq-item summary::after {
  content: "+";
  font-size: 1.3rem;
  color: var(--muted-fallback);
  transition: transform 0.2s ease;
}

.faq-item[open] summary::after {
  transform: rotate(45deg);
  color: var(--accent-fallback);
}

.faq-item summary:hover {
  background-color: var(--panel-strong-fallback);
}

.faq-content {
  padding: 0 24px 22px;
  font-size: 0.95rem;
  color: var(--muted-fallback);
  line-height: 1.65;
}

/* Back Link Button */
.back-cta {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  margin-top: 40px;
